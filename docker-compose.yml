services:
  db:
    container_name: patch-db
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-patchnotify}
      POSTGRES_USER: ${DB_USER:-patchuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-patchpass}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-patchuser} -d ${DB_NAME:-patchnotify}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: patch-web
    build: ./backend
    command: sh -c "python manage.py migrate --noinput && (python manage.py createsuperuser --noinput || true) && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - notion_md_data:/app/notion_md
      - patchnote_files:/app/media/patchnotes
    depends_on:
      db:
        condition: service_healthy

  slack-api:
    container_name: patch-slack
    build: ./slack-api
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  notion_md_data:
  patchnote_files:
