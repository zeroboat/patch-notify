<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>구독 설정</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f9; }
    .wrap { max-width: 400px; margin: 100px auto; text-align: center; padding: 0 16px; }
    .icon-circle { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2rem; }
  </style>
</head>
<body>
<div class="wrap">
  {% if error %}
  <div class="icon-circle bg-danger bg-opacity-10 text-danger">
    <i class="bi bi-exclamation-circle"></i>
  </div>
  <h5 class="fw-bold mb-2">링크 오류</h5>
  <p class="text-muted small">{{ error }}</p>
  {% else %}
  <div class="icon-circle bg-success bg-opacity-10 text-success">
    <i class="bi bi-check-circle"></i>
  </div>
  <h5 class="fw-bold mb-2">완료</h5>
  <p class="text-muted small">{{ message }}</p>
  {% endif %}
</div>
</body>
</html>
