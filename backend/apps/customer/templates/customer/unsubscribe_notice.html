<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수신 거부 완료</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f3f4; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 48px 40px; max-width: 440px; width: 100%; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 600; color: #202124; margin: 0 0 12px; }
    p { font-size: 14px; color: #5f6368; margin: 0; line-height: 1.6; }
    .email { font-weight: 500; color: #202124; }
  </style>
</head>
<body>
  <div class="card">
    {% if already_done %}
    <div class="icon">ℹ️</div>
    <h1>이미 수신 거부된 이메일입니다</h1>
    <p><span class="email">{{ email }}</span> 주소는 이미 공문 이메일 수신이 거부된 상태입니다.</p>
    {% else %}
    <div class="icon">✅</div>
    <h1>수신 거부가 완료되었습니다</h1>
    <p><span class="email">{{ email }}</span> 주소로 더 이상 공문 이메일이 발송되지 않습니다.</p>
    {% endif %}
  </div>
</body>
</html>
