<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);max-width:600px;">

          <!-- 헤더 -->
          <tr>
            <td style="background-color:#696cff;padding:24px 32px;">
              <p style="margin:0;color:rgba(255,255,255,0.8);font-size:12px;letter-spacing:1px;text-transform:uppercase;">공문 알림</p>
              <h1 style="margin:6px 0 0;color:#ffffff;font-size:22px;font-weight:600;line-height:1.3;">{{ subject }}</h1>
            </td>
          </tr>

          <!-- 본문 -->
          <tr>
            <td style="padding:32px;">
              <div style="color:#444444;font-size:15px;line-height:1.8;">
                {{ body|safe }}
              </div>
            </td>
          </tr>

          <!-- 구분선 -->
          <tr>
            <td style="padding:0 32px;">
              <hr style="border:none;border-top:1px solid #eeeeee;margin:0;">
            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td style="padding:20px 32px;background-color:#fafafa;">
              <p style="margin:0;color:#999999;font-size:12px;line-height:1.6;">
                이 메일은 <strong>Patch Notify</strong> 시스템에서 자동 발송되었습니다.<br>
                문의사항이 있으시면 담당자에게 연락해 주세요.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
