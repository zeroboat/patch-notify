services:
  db:
    container_name: patch-db-dev
    restart: unless-stopped
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-patchnotify_dev}
      POSTGRES_USER: ${DB_USER:-patchuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-patchpass}
      PGDATA: /var/lib/postgresql/18/docker
      TZ: Asia/Seoul
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-patchuser} -d ${DB_NAME:-patchnotify_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: patch-web-dev
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: sh -c "python manage.py migrate --noinput && (python manage.py createsuperuser --noinput || true) && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8010:8000"
    env_file: .env
    environment:
      - DEBUG=True
      - DB_HOST=db
      - DB_PORT=5432
      - TZ=Asia/Seoul
    volumes:
      - ./backend:/app
      - notion_md_data_dev:/app/notion_md
      - patchnote_files_dev:/app/media/patchnotes
    depends_on:
      db:
        condition: service_healthy

  qworker:
    container_name: patch-qworker-dev
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: python manage.py qcluster
    env_file: .env
    environment:
      - DEBUG=True
      - DB_HOST=db
      - DB_PORT=5432
      - TZ=Asia/Seoul
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  slack-api:
    container_name: patch-slack-dev
    restart: unless-stopped
    build:
      context: ./slack-api
      dockerfile: Dockerfile.dev
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8011:8001"
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - TZ=Asia/Seoul
    volumes:
      - ./slack-api:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_dev:
  notion_md_data_dev:
  patchnote_files_dev:
